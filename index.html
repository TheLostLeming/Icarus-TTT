<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARUS TTT - DS PRO CONTROL</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #3498db; --go: #2ecc71; --danger: #e74c3c; --warning: #f39c12; --text: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .main-timer { background: var(--card); padding: 30px; border-radius: 30px; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; position: sticky; top: 10px; z-index: 100; }
        .current-name { font-size: 3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0; min-height: 4rem; }
        
        .timer-circle { 
            font-size: 6rem; font-weight: 800; border-radius: 50%; width: 200px; height: 200px; 
            display: flex; align-items: center; justify-content: center; margin: 15px auto; 
            background: var(--card); position: relative; border: 10px solid #333; z-index: 1;
        }

        .timer-circle::before {
            content: ""; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%; background: conic-gradient(var(--circle-color, #3498db) var(--progress, 0%), transparent 0); z-index: -1;
        }

        .next-up-text { color: #888; font-size: 0.85rem; margin-top: 5px; height: 1.2rem; font-weight: 600; }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        
        .btn-start { background: var(--go); color: white; flex: 1; }
        .btn-start.running { background: var(--danger); }
        .btn-climb { background: #8e44ad; color: white; }
        .btn-climb.active { background: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .btn-audio { background: #555; color: white; width: 100%; margin-top: 10px; font-size: 0.8rem; }
        
        .rider-list { width: 440px; margin-top: 25px; }
        .rider-row { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 15px; margin-bottom: 8px; border-radius: 12px; border-left: 6px solid #444; }
        .rider-row.active { border-left-color: var(--go); background: #252525; transform: scale(1.02); }
        .rider-row.will-skip { border-left-color: var(--warning); opacity: 0.7; }
        
        .rider-controls { display: flex; align-items: center; gap: 5px; }
        .small-btn { padding: 4px 8px; background: #444; color: white; border-radius: 4px; font-size: 0.7rem; }
        .skip-pill { background: var(--warning); color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .drop-btn { color: var(--danger); background: transparent; font-size: 1.2rem; }
        .inline-skip-btn { background: transparent; color: var(--warning); font-size: 1.2rem; padding: 0 5px; }
        .order-btn { background: transparent; color: #666; font-size: 1rem; padding: 0 2px; }
        .connection-status { font-size: 0.7rem; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="main-timer">
        <div id="current-name" class="current-name">READY</div>
        <div id="next-up-label" class="next-up-text"></div>
        <div class="timer-circle" id="timer-display">
            <span id="display-time">--</span>
        </div>
        
        <div class="btn-group">
            <button class="btn-start" onclick="masterToggle()" id="start-btn">START</button>
            <button class="btn-climb" onclick="masterClimb()" id="climb-btn">CLIMB</button>
            <button onclick="masterReset()" style="background:#444; color:white;">RESET</button>
            <button class="btn-audio" onclick="unlockAudio()">TAP TO UNMUTE / TEST AUDIO</button>
        </div>
        <div id="status" class="connection-status">Syncing...</div>
    </div>

    <div class="rider-list" id="rider-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlPdzvhWSei60quuv8bOniUiz6-RJtmKE",
            authDomain: "icarus-ttt.firebaseapp.com",
            databaseURL: "https://icarus-ttt-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "icarus-ttt",
            storageBucket: "icarus-ttt.firebasestorage.app",
            messagingSenderId: "315198331779",
            appId: "1:315198331779:web:29ac0ba526ba7c8498f4b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const timerRef = ref(db, 'liveTimer');

        window.riders = [
            { name: "George", pull: 40, skipNext: false }, { name: "Jamie", pull: 40, skipNext: false },
            { name: "Fuzzy", pull: 30, skipNext: false }, { name: "Jeff", pull: 30, skipNext: false },
            { name: "David", pull: 20, skipNext: false }, { name: "Espley", pull: 20, skipNext: false }
        ];
        const PHONETIC_NAMES = { "Fuzzy": "Fuzzy", "Espley": "Es-plea" };
        window.index = 0;
        window.timeLeft = 40;
        window.isRunning = false;
        window.isClimb = false;
        let interval;
        let audioCtx;

        window.unlockAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            speak("System Ready");
            beep(440, 0.2);
            document.querySelector('.btn-audio').innerText = "AUDIO UNLOCKED";
            document.querySelector('.btn-audio').style.background = "#2ecc71";
        };

        onValue(timerRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.riders = data.riders || window.riders;
                window.index = data.index;
                window.timeLeft = data.timeLeft;
                window.isRunning = data.isRunning;
                window.isClimb = data.isClimb;
                document.getElementById('status').innerText = "LIVE SYNC ACTIVE";
                syncVisuals();
                if (window.isRunning && !interval) {
                    interval = setInterval(tick, 1000);
                } else if (!window.isRunning) {
                    clearInterval(interval);
                    interval = null;
                }
            } else { pushUpdate(); }
        });

        window.pushUpdate = () => {
            set(timerRef, {
                riders: window.riders, index: window.index,
                timeLeft: window.timeLeft, isRunning: window.isRunning, isClimb: window.isClimb
            });
        };

        // --- ENHANCED SKIP LOGIC ---
        window.toggleSkip = (idx) => {
            if (idx === window.index) {
                // If they are on the front, skip them immediately
                let skippedName = window.riders[window.index].name;
                findNextRider();
                speak(`Skipping ${skippedName}. Go ${getSpeakName(window.riders[window.index].name)}.`);
            } else {
                // If they are in the queue, just mark them for skipping
                window.riders[idx].skipNext = !window.riders[idx].skipNext;
                speak(window.riders[idx].skipNext ? `${window.riders[idx].name} skipping` : `${window.riders[idx].name} back in`);
            }
            pushUpdate();
        };

        function findNextRider() {
            let startIdx = window.index;
            let found = false;
            // Loop through riders to find the next one NOT marked for skipping
            for (let i = 1; i <= window.riders.length; i++) {
                let next = (startIdx + i) % window.riders.length;
                if (!window.riders[next].skipNext || i === window.riders.length) {
                    window.index = next;
                    // Reset the skipping status once they've been skipped
                    window.riders[startIdx].skipNext = false; 
                    window.timeLeft = getAdjustedPull(window.riders[window.index]);
                    found = true;
                    break;
                }
            }
        }

        window.adjustTime = (idx, amt) => {
            window.riders[idx].pull = Math.max(5, window.riders[idx].pull + amt);
            if (idx === window.index) window.timeLeft = Math.max(1, window.timeLeft + amt);
            pushUpdate();
        };

        window.dropRider = (idx) => {
            if (!confirm(`Drop ${window.riders[idx].name}?`)) return;
            if (idx === window.index) {
                window.index = (window.index + 1) % window.riders.length;
                window.riders.splice(idx, 1);
                window.index = window.index % window.riders.length;
                window.timeLeft = getAdjustedPull(window.riders[window.index]);
            } else {
                window.riders.splice(idx, 1);
                if (idx < window.index) window.index--;
            }
            pushUpdate();
        };

        window.moveRider = (idx, dir) => {
            let newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= window.riders.length) return;
            [window.riders[idx], window.riders[newIdx]] = [window.riders[newIdx], window.riders[idx]];
            if (idx === window.index) window.index = newIdx;
            else if (newIdx === window.index) window.index = idx;
            pushUpdate();
        };

        window.masterReset = () => {
            window.index = 0;
            window.riders.forEach(r => r.skipNext = false);
            window.timeLeft = getAdjustedPull(window.riders[0]);
            window.isRunning = false;
            pushUpdate();
        };

        function tick() {
            if (window.timeLeft > 0) window.timeLeft--;
            checkAlerts();
            if (window.timeLeft <= 0) {
                findNextRider();
                speak(`Go ${getSpeakName(window.riders[window.index].name)}. ${window.timeLeft} seconds.`);
                pushUpdate();
            }
            syncVisuals();
        }

        window.masterToggle = () => {
            unlockAudio();
            window.isRunning = !window.isRunning;
            pushUpdate();
        };

        window.masterClimb = () => {
            window.isClimb = !window.isClimb;
            speak(window.isClimb ? "Climb mode" : "Standard");
            pushUpdate();
        };

        function syncVisuals() {
            const currentRider = window.riders[window.index];
            const totalPullTime = getAdjustedPull(currentRider);
            document.getElementById('display-time').innerText = window.timeLeft;
            document.getElementById('current-name').innerText = currentRider ? currentRider.name : "DONE";
            document.getElementById('start-btn').innerText = window.isRunning ? "STOP" : "START";
            document.getElementById('start-btn').className = window.isRunning ? "btn-start running" : "btn-start";
            document.getElementById('climb-btn').classList.toggle('active', window.isClimb);
            
            const progressPercent = (window.timeLeft / totalPullTime) * 100;
            const circle = document.getElementById('timer-display');
            let colorCode = '#3498db';
            if (window.timeLeft <= 4) colorCode = '#e74c3c';
            else if (window.timeLeft <= 10) colorCode = '#f39c12';
            circle.style.setProperty('--progress', `${progressPercent}%`);
            circle.style.setProperty('--circle-color', colorCode);

            // Update Next List (Accounting for Skips)
            let nextRiders = [];
            let checkIdx = window.index;
            for(let i=1; i<window.riders.length; i++) {
                let r = window.riders[(checkIdx + i) % window.riders.length];
                if (!r.skipNext) nextRiders.push(r.name);
                if (nextRiders.length >= 2) break;
            }
            document.getElementById('next-up-label').innerText = nextRiders.length > 0 ? `Next: ${nextRiders.join(', ')}` : "";

            let html = "";
            window.riders.forEach((r, i) => {
                const pTime = getAdjustedPull(r);
                const isSkipping = r.skipNext;
                html += `<div class="rider-row ${i === window.index ? 'active' : ''} ${isSkipping ? 'will-skip' : ''}">
                    <div style="display:flex; align-items:center;">
                        <button class="order-btn" onclick="moveRider(${i}, -1)">▲</button>
                        <button class="order-btn" onclick="moveRider(${i}, 1)">▼</button>
                        <span style="margin-left:8px;">${r.name} ${isSkipping ? '<span class="skip-pill">SKIPPING</span>' : ''}</span>
                    </div>
                    <div class="rider-controls">
                        <button class="inline-skip-btn" onclick="toggleSkip(${i})" title="Skip this turn">⏭️</button>
                        <button class="small-btn" onclick="adjustTime(${i}, -5)">-5</button>
                        <span style="min-width:25px; text-align:center; font-size:0.8rem;">${pTime}s</span>
                        <button class="small-btn" onclick="adjustTime(${i}, 5)">+5</button>
                        <button class="drop-btn" onclick="dropRider(${i})">🗑</button>
                    </div>
                </div>`;
            });
            document.getElementById('rider-list').innerHTML = html;
        }

        function getAdjustedPull(r) { if(!r) return 40; return window.isClimb ? Math.round(r.pull * 0.5) : r.pull; }
        function getSpeakName(name) { return PHONETIC_NAMES[name] || name; }
        function speak(text) { 
            if(window.speechSynthesis) {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(text); 
                msg.rate = 1.1; 
                window.speechSynthesis.speak(msg); 
            }
        }
        function checkAlerts() {
            if (window.timeLeft === 10) {
                let nextNames = [];
                let checkIdx = window.index;
                for(let i=1; i<window.riders.length; i++) {
                    let r = window.riders[(checkIdx + i) % window.riders.length];
                    if (!r.skipNext) nextNames.push(getSpeakName(r.name));
                    if (nextNames.length >= 3) break;
                }
                speak(`In 10 seconds: ${nextNames.join(', ')}`);
            }
            if (window.timeLeft <= 4 && window.timeLeft > 0) beep(800, 0.1);
        }
        function beep(freq, duration) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.value = freq; gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        syncVisuals();
    </script>
</body>
</html>
