<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTRL TTT - Team Timer Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #3498db; --go: #2ecc71; --danger: #e74c3c; --text: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-timer { background: var(--card); padding: 30px; border-radius: 30px; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; margin-top: 10px; }
        .current-name { font-size: 3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0; }
        .timer-circle { font-size: 6rem; font-weight: 800; border: 10px solid #333; border-top-color: var(--accent); border-radius: 50%; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin: 15px auto; }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-start { background: var(--go); color: white; flex: 1; }
        .btn-start.running { background: var(--danger); }
        .btn-climb { background: #8e44ad; color: white; }
        .btn-climb.active { background: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .rider-list { width: 420px; margin-top: 25px; }
        .rider-row { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; border-left: 6px solid #444; transition: 0.2s; }
        .rider-row.active { border-left-color: var(--go); background: #252525; transform: scale(1.02); }
        .rider-controls { display: flex; align-items: center; gap: 8px; }
        .time-adjust { display: flex; align-items: center; gap: 4px; background: #2a2a2a; border-radius: 6px; padding: 2px 5px; }
        .small-btn { padding: 4px 8px; background: #444; color: white; border-radius: 4px; font-size: 0.8rem; }
        .order-btn { background: transparent; color: #888; font-size: 1.1rem; padding: 0 5px; }
        .drop-btn { color: var(--danger); background: transparent; font-size: 1.1rem; }
        .sync-panel { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 350px; text-align:center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="sync-panel">
        <label>AUTO-SYNC START TIME:</label>
        <input type="time" id="start-time" value="19:00" style="background:#333; color:white; border:1px solid #555; padding:5px; border-radius:5px;">
        <button onclick="activateAutoSync()" style="background:var(--accent); color:white; padding:5px 10px; font-size:0.7rem; margin-top:5px;">ACTIVATE SYNC</button>
    </div>

    <div class="main-timer">
        <div id="current-name" class="current-name">READY</div>
        <div id="next-up-label" style="color:#888; font-size: 0.9rem; margin-top:5px;"></div>
        <div class="timer-circle" id="display-time">--</div>
        
        <div class="btn-group">
            <button class="btn-start" onclick="toggleManualTimer()" id="start-btn">START</button>
            <button class="btn-climb" onclick="toggleClimb()" id="climb-btn">CLIMB</button>
            <button onclick="resetRotation()" style="background:#444; color:white;">RESET</button>
        </div>
    </div>

    <div class="rider-list" id="rider-list"></div>

    <script>
        // --- DATA SETUP ---
        let defaultRiders = [
            { name: "George", pull: 40 },
            { name: "Jamie", pull: 40 },
            { name: "Fuzzy", pull: 30 },
            { name: "Jeff", pull: 30 },
            { name: "David", pull: 20 },
            { name: "Espley", pull: 20 }
        ];

        let riders = JSON.parse(localStorage.getItem('ttt-team')) || defaultRiders;
        const PHONETIC_NAMES = { "Fuzzy": "Fuzzy", "Espley": "Es-plea" };

        let index = 0;
        let timeLeft = riders[0].pull;
        let isClimb = false;
        let isRunning = false;
        let isAutoMode = false;
        let interval;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function saveTeam() { localStorage.setItem('ttt-team', JSON.stringify(riders)); }

        function updateUI() {
            document.getElementById('display-time').innerText = timeLeft;
            document.getElementById('current-name').innerText = riders[index] ? riders[index].name : "---";
            let next3 = [];
            if(riders.length > 1) {
                for(let i=1; i<=Math.min(3, riders.length-1); i++) {
                    next3.push(riders[(index + i) % riders.length].name);
                }
            }
            document.getElementById('next-up-label').innerText = next3.length ? `Next: ${next3.join(', ')}` : "";

            let html = "";
            riders.forEach((r, i) => {
                const actualPull = getAdjustedPull(r);
                html += `
                <div class="rider-row ${i === index ? 'active' : ''}">
                    <div style="display:flex; align-items:center;">
                        <button class="order-btn" onclick="moveRider(${i}, -1)">▲</button>
                        <button class="order-btn" onclick="moveRider(${i}, 1)">▼</button>
                        <span style="margin-left:10px;">${r.name}</span>
                    </div>
                    <div class="rider-controls">
                        <div class="time-adjust">
                            <button class="small-btn" onclick="adjustTime(${i}, -5)">-</button>
                            <span style="min-width:25px; text-align:center;">${actualPull}s</span>
                            <button class="small-btn" onclick="adjustTime(${i}, 5)">+</button>
                        </div>
                        <button class="drop-btn" onclick="dropRider(${i})">🗑</button>
                    </div>
                </div>`;
            });
            document.getElementById('rider-list').innerHTML = html;
        }

        function getAdjustedPull(rider) {
            return isClimb ? Math.round(rider.pull * 0.5) : rider.pull;
        }

        function adjustTime(idx, amount) {
            riders[idx].pull = Math.max(5, riders[idx].pull + amount);
            if (idx === index && !isAutoMode) timeLeft = Math.max(1, timeLeft + amount);
            saveTeam(); updateUI();
        }

        function dropRider(idx) {
            if (!confirm(`Drop ${riders[idx].name}?`)) return;
            if (idx === index) { transitionRider(); riders.splice(idx, 1); index = index % riders.length; } 
            else { riders.splice(idx, 1); if (idx < index) index--; }
            saveTeam(); updateUI();
        }

        function moveRider(idx, direction) {
            let newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= riders.length) return;
            [riders[idx], riders[newIdx]] = [riders[newIdx], riders[idx]];
            if (idx === index) index = newIdx; else if (newIdx === index) index = idx;
            saveTeam(); updateUI();
        }

        function resetRotation() { index = 0; timeLeft = getAdjustedPull(riders[0]); updateUI(); }

        function toggleManualTimer() {
            isAutoMode = false; isRunning = !isRunning;
            document.getElementById('start-btn').innerText = isRunning ? "PAUSE" : "RESUME";
            document.getElementById('start-btn').className = isRunning ? "btn-start running" : "btn-start";
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isRunning) interval = setInterval(manualTick, 1000); else clearInterval(interval);
        }

        function manualTick() {
            if (timeLeft > 0) timeLeft--;
            checkAlerts();
            if (timeLeft <= 0) transitionRider();
            updateUI();
        }

        function activateAutoSync() {
            isAutoMode = true; isRunning = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            interval = setInterval(autoTick, 1000);
            speak("Auto Sync active");
        }

        function autoTick() {
            const now = new Date();
            const [h, m] = document.getElementById('start-time').value.split(':');
            const start = new Date(); start.setHours(h, m, 0, 0);
            let diff = Math.floor((now - start) / 1000);
            if (diff < 0) { timeLeft = Math.abs(diff); updateUI(); return; }

            const rotLen = riders.reduce((acc, r) => acc + getAdjustedPull(r), 0);
            let timeInRot = diff % rotLen;
            let cum = 0;
            for (let i = 0; i < riders.length; i++) {
                let pTime = getAdjustedPull(riders[i]);
                if (timeInRot < cum + pTime) {
                    if (index !== i) { 
                        index = i; 
                        speak(`Go ${getSpeakName(riders[index].name)}. ${pTime} seconds.`); 
                    }
                    timeLeft = (cum + pTime) - timeInRot;
                    checkAlerts();
                    break;
                }
                cum += pTime;
            }
            updateUI();
        }

        function checkAlerts() {
            if (timeLeft === 10) {
                let n1 = getSpeakName(riders[(index + 1) % riders.length].name);
                let n2 = getSpeakName(riders[(index + 2) % riders.length].name);
                let n3 = getSpeakName(riders[(index + 3) % riders.length].name);
                speak(`In 10 seconds: ${n1}, ${n2}, ${n3}`);
            }
            if (timeLeft <= 4 && timeLeft > 0) beep(800, 0.1);
            if (timeLeft === 1) setTimeout(() => beep(1200, 0.4), 1000);
        }

        function transitionRider() {
            index = (index + 1) % riders.length;
            let pTime = getAdjustedPull(riders[index]);
            timeLeft = pTime;
            speak(`Go ${getSpeakName(riders[index].name)}. ${pTime} seconds.`);
        }

        function toggleClimb() {
            isClimb = !isClimb;
            document.getElementById('climb-btn').classList.toggle('active');
            speak(isClimb ? "Climb mode" : "Standard");
            updateUI();
        }

        function getSpeakName(name) { return PHONETIC_NAMES[name] || name; }
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1; 
            window.speechSynthesis.speak(msg);
        }
        function beep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        updateUI();
    </script>
</body>
</html>
