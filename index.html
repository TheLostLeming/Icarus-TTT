<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICARUS TTT - LIVE SYNC</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #3498db; --go: #2ecc71; --danger: #e74c3c; --text: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-timer { background: var(--card); padding: 30px; border-radius: 30px; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #333; }
        .current-name { font-size: 3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0; }
        .timer-circle { font-size: 6rem; font-weight: 800; border: 10px solid #333; border-top-color: var(--accent); border-radius: 50%; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; margin: 15px auto; }
        .btn-group { display: flex; gap: 8px; justify-content: center; }
        button { padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: var(--go); color: white; flex: 1; }
        .btn-start.running { background: var(--danger); }
        .btn-climb { background: #8e44ad; color: white; }
        .btn-climb.active { background: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .rider-list { width: 420px; margin-top: 25px; }
        .rider-row { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; border-left: 6px solid #444; }
        .rider-row.active { border-left-color: var(--go); background: #252525; transform: scale(1.02); }
        .connection-status { font-size: 0.7rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-timer">
        <div id="current-name" class="current-name">STANDBY</div>
        <div id="next-up-label" style="color:#888; font-size: 0.9rem; margin-top:5px;"></div>
        <div class="timer-circle" id="display-time">--</div>
        
        <div class="btn-group">
            <button class="btn-start" onclick="masterToggle()" id="start-btn">START LIVE</button>
            <button class="btn-climb" onclick="masterClimb()" id="climb-btn">CLIMB</button>
        </div>
        <div id="status" class="connection-status">Connecting to Firebase...</div>
    </div>

    <div class="rider-list" id="rider-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAlPdzvhWSei60quuv8bOniUiz6-RJtmKE",
            authDomain: "icarus-ttt.firebaseapp.com",
            databaseURL: "https://icarus-ttt-default-rtdb.firebaseio.com",
            projectId: "icarus-ttt",
            storageBucket: "icarus-ttt.firebasestorage.app",
            messagingSenderId: "315198331779",
            appId: "1:315198331779:web:29ac0ba526ba7c8498f4b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const timerRef = ref(db, 'liveTimer');

        // --- TEAM SETUP ---
        let riders = [
            { name: "George", pull: 40 },
            { name: "Jamie", pull: 40 },
            { name: "Fuzzy", pull: 30 },
            { name: "Jeff", pull: 30 },
            { name: "David", pull: 20 },
            { name: "Espley", pull: 20 }
        ];
        const PHONETIC_NAMES = { "Fuzzy": "Fuzzy", "Espley": "Es-plea" };

        window.index = 0;
        window.timeLeft = riders[0].pull;
        window.isRunning = false;
        window.isClimb = false;
        let interval;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- FIREBASE SYNC LOGIC ---

        onValue(timerRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.index = data.index;
                window.timeLeft = data.timeLeft;
                window.isRunning = data.isRunning;
                window.isClimb = data.isClimb;
                
                document.getElementById('status').innerText = "LIVE SYNC ACTIVE";
                syncVisuals();
                
                if (window.isRunning && !interval) {
                    interval = setInterval(tick, 1000);
                } else if (!window.isRunning) {
                    clearInterval(interval);
                    interval = null;
                }
            }
        });

        window.pushUpdate = () => {
            set(timerRef, {
                index: window.index,
                timeLeft: window.timeLeft,
                isRunning: window.isRunning,
                isClimb: window.isClimb
            });
        };

        // --- TIMER FUNCTIONS ---

        function tick() {
            if (window.timeLeft > 0) window.timeLeft--;
            checkAlerts();
            if (window.timeLeft <= 0) {
                window.index = (window.index + 1) % riders.length;
                window.timeLeft = getAdjustedPull(riders[window.index]);
                speak(`Go ${getSpeakName(riders[window.index].name)}. ${window.timeLeft} seconds.`);
                pushUpdate();
            }
            syncVisuals();
        }

        window.masterToggle = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            window.isRunning = !window.isRunning;
            pushUpdate();
        };

        window.masterClimb = () => {
            window.isClimb = !window.isClimb;
            speak(window.isClimb ? "Climb mode" : "Standard");
            pushUpdate();
        };

        function syncVisuals() {
            document.getElementById('display-time').innerText = window.timeLeft;
            document.getElementById('current-name').innerText = riders[window.index].name;
            document.getElementById('start-btn').innerText = window.isRunning ? "STOP LIVE" : "START LIVE";
            document.getElementById('start-btn').className = window.isRunning ? "btn-start running" : "btn-start";
            document.getElementById('climb-btn').classList.toggle('active', window.isClimb);
            
            let next3 = [];
            for(let i=1; i<=3; i++) next3.push(riders[(window.index + i) % riders.length].name);
            document.getElementById('next-up-label').innerText = `Next: ${next3.join(', ')}`;

            let html = "";
            riders.forEach((r, i) => {
                const pTime = getAdjustedPull(r);
                html += `<div class="rider-row ${i === window.index ? 'active' : ''}">
                    <span>${r.name}</span><span>${pTime}s</span>
                </div>`;
            });
            document.getElementById('rider-list').innerHTML = html;
        }

        function getAdjustedPull(r) { return window.isClimb ? Math.round(r.pull * 0.5) : r.pull; }
        function getSpeakName(name) { return PHONETIC_NAMES[name] || name; }
        
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function checkAlerts() {
            if (window.timeLeft === 10) {
                let n1 = riders[(window.index + 1) % riders.length].name;
                speak(`In 10 seconds: ${n1}`);
            }
            if (window.timeLeft <= 4 && window.timeLeft > 0) beep(800, 0.1);
        }

        function beep(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        syncVisuals();
    </script>
</body>
</html>
